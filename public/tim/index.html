  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0D0D0F; color: #F2EDE4; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 24px;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  }
  .card { width: 100%; max-width: 420px; position: relative; }
  .card::before, .card::after, .card-inner::before, .card-inner::after {
    content: ''; position: absolute; width: 32px; height: 32px;
    border-color: #B8962E; border-style: solid; border-width: 0;
  }
  .card::before { top: 0; left: 0; border-top-width: 2px; border-left-width: 2px; }
  .card::after { top: 0; right: 0; border-top-width: 2px; border-right-width: 2px; }
  .card-inner::before { bottom: 0; left: 0; border-bottom-width: 2px; border-left-width: 2px; }
  .card-inner::after { bottom: 0; right: 0; border-bottom-width: 2px; border-right-width: 2px; }
  .card-inner { padding: 48px 32px; position: relative; }

  .logo { margin-bottom: 36px; }
  .logo img { height: 32px; width: auto; display: block; }

  .name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 56px; font-weight: 900;
    letter-spacing: normal; text-transform: uppercase;
    color: #F2EDE4; line-height: 0.92; margin-bottom: 8px;
  }
  .title {
    font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 400;
    color: #B8962E; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 36px;
  }
  .divider { width: 40px; height: 2px; background: #B8962E; opacity: 0.4; margin-bottom: 28px; }
  .contact-row {
    display: flex; align-items: center; gap: 14px; margin-bottom: 16px;
    text-decoration: none; color: #F2EDE4; transition: color 0.2s;
  }
  .contact-row:hover { color: #B8962E; }
  .contact-row svg { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.6; }
  .contact-row span { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 400; }
  .actions { margin-top: 36px; display: flex; gap: 12px; }
  .btn {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 14px 16px; border: none; border-radius: 4px;
    font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 400;
    letter-spacing: 1px; text-transform: uppercase; cursor: pointer;
    text-decoration: none; transition: all 0.2s;
  }
  .btn-primary { background: #B8962E; color: #0D0D0F; }
  .btn-primary:hover { background: #D4AF37; }
  .btn-secondary { background: transparent; color: #F2EDE4; border: 1px solid rgba(184,150,46,0.3); }
  .btn-secondary:hover { border-color: #B8962E; color: #B8962E; }
  .btn svg { width: 16px; height: 16px; }
  .qr-section { margin-top: 36px; text-align: center; }
  .qr-label {
    font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 400;
    letter-spacing: 2px; text-transform: uppercase; color: #E7E1D6; opacity: 0.4; margin-bottom: 16px;
  }
  .qr-wrap { display: inline-block; padding: 12px; background: #F2EDE4; border-radius: 4px; }
  .qr-wrap img { display: block; width: 160px; height: 160px; }
  .footer {
    margin-top: 32px; text-align: center; font-family: 'Space Mono', monospace;
    font-size: 9px; font-weight: 400; letter-spacing: 2px; text-transform: uppercase;
    color: #E7E1D6; opacity: 0.2;
